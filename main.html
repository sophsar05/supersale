<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routing...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .message-box {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .status {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 10px;
        }
        .location-indicator {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="message-box">
        <div class="status" id="status-text">Detecting your location...</div>
        <div class="location-indicator" id="location-display"></div>
    </div>

    <script>
        // Fetch location data based on the user's IP address
        fetch('https://ipapi.co/json/')
            .then(response => response.json())
            .then(data => {
                // Get the city and region, with fallbacks just in case
                const city = data.city ? data.city : 'Unknown City';
                const region = data.region ? data.region : 'Unknown Region';
                
                // Display the detected location on the screen
                document.getElementById('status-text').innerText = 'Location detected! Redirecting...';
                document.getElementById('location-display').innerText = city + ', ' + region;
                
                // Convert city name to lowercase to make the check easier
                const cityLower = city.toLowerCase();
                
                // Wait 2 seconds (2000 milliseconds) so the user can read the indicator, then redirect
                setTimeout(() => {
                    if (cityLower.includes('paranaque') || cityLower.includes('paranaque')) {
                        // Redirect to location1.html for Las Piñas users
                        window.location.replace('location1.html');
                    } else {
                        // Redirect to location2.html for everyone else
                        window.location.replace('location2.html');
                    }
                }, 2000); 
            })
            .catch(error => {
                console.error('Error fetching location data:', error);
                
                // Update text if the API is blocked or fails
                document.getElementById('status-text').innerText = 'Unable to detect location. Redirecting to default...';
                
                // Wait 2 seconds, then fallback to location2.html
                setTimeout(() => {
                    window.location.replace('location2.html');
                }, 2000);
            });
    </script>

</body>
</html>
